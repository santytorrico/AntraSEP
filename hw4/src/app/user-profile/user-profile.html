<h1>Welcome, {{ profileForm.value.name }}!</h1>
<form [formGroup]="profileForm">
    <div>
        <label>
            <input type="text" formControlName="name">
            Name:
        </label>
    </div>
    
    <div>
        <label>
            <input type="email" formControlName="email">
            Email:
        </label>
    </div>
    
    <div>
        <label>
            <input type="date" formControlName="dateOfBirth">
            Date of Birth:
        </label>
    </div>
</form>

<hr>

<h3>Profile Preview</h3>

<p><strong>Name:</strong> {{ profileForm.value.name }}</p>
<p><strong>Email:</strong> {{ profileForm.value.email }}</p>
<p><strong>Date of Birth:</strong> {{ profileForm.value.dateOfBirth }}</p>

<hr>

<button (click)="saveProfile()" [disabled]="isEmpty()">Save</button>
<button (click)="resetForm()" [disabled]="isEmpty()">Reset</button>

<p>Save count: {{ saveCount }}</p>
